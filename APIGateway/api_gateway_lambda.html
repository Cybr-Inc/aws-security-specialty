<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Gateway + Lambda Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
  }

  h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 12px;
    color: #334155;
    margin-bottom: 28px;
    text-align: center;
  }

  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .toggle-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid #1e293b;
    background: transparent;
    color: #475569;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .toggle-btn.active {
    background: #1e3a5f;
    border-color: #3b82f6;
    color: #93c5fd;
  }

  .diagram {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 720px;
    position: relative;
    margin-bottom: 28px;
  }

  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .node-box {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border: 2px solid transparent;
    transition: all 0.25s ease;
  }

  .node-box svg { width: 44px; height: 44px; }

  .node:hover .node-box { transform: translateY(-4px); }
  .node.active .node-box { transform: translateY(-4px); }

  .node-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
    text-align: center;
    transition: color 0.2s;
  }

  .node.active .node-label { color: #94a3b8; }

  /* Client colors */
  .node.client .node-box { background: #0f172a; border-color: #1e293b; }
  .node.client.active .node-box { border-color: #60a5fa; box-shadow: 0 0 0 4px rgba(96,165,250,0.1), 0 16px 32px rgba(0,0,0,0.5); }

  /* API GW colors */
  .node.apigw .node-box { background: #0a1a0f; border-color: #14532d; }
  .node.apigw.active .node-box { border-color: #4ade80; box-shadow: 0 0 0 4px rgba(74,222,128,0.1), 0 16px 32px rgba(0,0,0,0.5); }

  /* Lambda colors */
  .node.lambda .node-box { background: #1c0a00; border-color: #7c2d12; }
  .node.lambda.active .node-box { border-color: #fb923c; box-shadow: 0 0 0 4px rgba(251,146,60,0.1), 0 16px 32px rgba(0,0,0,0.5); }

  /* Dimmed */
  .node.dimmed { opacity: 0.25; pointer-events: none; }

  /* Arrows */
  .arrow {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 4px;
    position: relative;
    overflow: hidden;
  }

  .arrow-label {
    font-size: 10px;
    color: #334155;
    letter-spacing: 0.04em;
    transition: color 0.3s;
    white-space: nowrap;
  }

  .arrow-label.lit { color: #60a5fa; }

  .arrow-url {
    font-size: 9px;
    color: #f59e0b;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    text-align: center;
  }

  .arrow-track {
    width: 100%;
    height: 2px;
    background: #1e293b;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .arrow-track.lit { background: #1e3a5f; }

  .arrow-track::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    border-left: 7px solid #1e293b;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .arrow-track.lit::after { border-left-color: #3b82f6; }

  @keyframes slide {
    0%   { left: -12px; opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { left: calc(100%); opacity: 0; }
  }

  .packet {
    position: absolute;
    top: 50%;
    left: -12px;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #3b82f6;
    box-shadow: 0 0 8px #3b82f6;
    animation: slide 1.4s linear infinite;
    display: none;
  }

  .packet.show { display: block; }

  /* Warning badge for direct mode */
  .direct-warn {
    position: absolute;
    top: -8px;
    right: -8px;
    font-size: 14px;
    display: none;
  }

  .node.client.direct-mode .direct-warn { display: block; }

  /* Panel */
  .panel {
    width: 100%;
    max-width: 720px;
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 22px 24px;
    min-height: 140px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .panel-icon { font-size: 22px; }

  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
  }

  .panel-text {
    font-size: 13px;
    line-height: 1.75;
    color: #64748b;
  }

  .chip {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    margin: 2px 2px;
  }

  .chip.blue  { background: #0f2744; color: #93c5fd; }
  .chip.green { background: #052e16; color: #86efac; }
  .chip.amber { background: #431407; color: #fed7aa; }
  .chip.red   { background: #450a0a; color: #fca5a5; }
</style>
</head>
<body>

<h1>AWS API Gateway &amp; Lambda</h1>
<p class="subtitle">Click any component &nbsp;&bull;&nbsp; Toggle between invocation modes</p>

<div class="toggle-row">
  <button class="toggle-btn active" id="btn-gw" onclick="setMode('gateway')">🛡️ Via API Gateway</button>
  <button class="toggle-btn"        id="btn-direct" onclick="setMode('direct')">⚠️ Direct Invocation</button>
</div>

<div class="diagram" id="diagram">

  <div class="node client active" id="n-client" onclick="pick('client')">
    <div class="node-box" style="position:relative">
      🖥️<span class="direct-warn">⚠️</span>
    </div>
    <div class="node-label">Client</div>
  </div>

  <div class="arrow" id="a1">
    <div class="arrow-label lit" id="a1-lbl">HTTPS Request</div>
    <div class="arrow-url" id="a1-url">https://api.example.com/prod/items</div>
    <div class="arrow-track lit" id="a1-track">
      <div class="packet show" id="p1"></div>
    </div>
  </div>

  <div class="node apigw" id="n-apigw" onclick="pick('apigw')">
    <div class="node-box"><svg height="40" width="40" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient x1="0%" y1="100%" x2="100%" y2="0%" id="apigw-grad"><stop stop-color="#4D27A8" offset="0%"></stop><stop stop-color="#A166FF" offset="100%"></stop></linearGradient></defs><g fill="none" fill-rule="evenodd"><path d="M0 0h40v40H0z" fill="url(#apigw-grad)"></path><path d="M19 28h2v-1h-2v1zM14 7.262l-7 3.04v20.055l7 2.439V7.262zM15 13v14h2v1h-2v5.5a.5.5 0 01-.664.472l-8-2.787A.5.5 0 016 30.713V9.974c0-.199.118-.379.301-.458l8-3.474A.5.5 0 0115 6.5V12h2v1h-2zm18-2.698l-7-3.04v25.534l7-2.439V10.302zm1-.328v20.739a.5.5 0 01-.336.472l-8 2.787a.507.507 0 01-.454-.064.5.5 0 01-.21-.408V28h-2v-1h2V13h-2v-1h2V6.5a.5.5 0 01.699-.458l8 3.474a.499.499 0 01.301.458zM19 13h2v-1h-2v1zm4.975 2.658l-.95-.316-3 9 .95.316 3-9zm-4.829 7.196l-3-3a.502.502 0 010-.708l3-3 .708.708-2.647 2.646 2.647 2.646-.708.708z" fill="#FFF"></path></g></svg></div>
    <div class="node-label">API Gateway</div>
  </div>

  <div class="arrow" id="a2">
    <div class="arrow-label lit" id="a2-lbl">Invoke</div>
    <div class="arrow-url" id="a2-url"></div>
    <div class="arrow-track lit" id="a2-track">
      <div class="packet show" id="p2"></div>
    </div>
  </div>

  <div class="node lambda" id="n-lambda" onclick="pick('lambda')">
    <div class="node-box"><svg height="40" width="40" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient x1="0%" y1="100%" x2="100%" y2="0%" id="lambda-grad"><stop stop-color="#C8511B" offset="0%"></stop><stop stop-color="#F90" offset="100%"></stop></linearGradient></defs><g fill="none" fill-rule="evenodd"><path d="M0 0h40v40H0z" fill="url(#lambda-grad)"></path><path d="M14.386 33H8.27l6.763-14.426 3.064 6.44L14.387 33zm1.085-15.798a.49.49 0 00-.442-.282h-.002a.493.493 0 00-.441.285l-7.538 16.08a.507.507 0 00.028.482c.09.145.247.233.415.233h7.206c.19 0 .363-.111.445-.286l3.944-8.489a.508.508 0 00-.002-.432l-3.613-7.591zM32.018 33h-5.882l-9.47-20.711a.491.491 0 00-.444-.289H12.37l.005-5h7.549l9.424 20.71c.08.177.256.29.446.29h2.224v5zm.49-6h-2.4L20.684 6.29a.492.492 0 00-.446-.29h-8.353a.496.496 0 00-.491.5l-.006 6c0 .132.052.259.144.354a.488.488 0 00.347.146h4.032l9.468 20.711c.08.176.254.289.445.289h6.686a.495.495 0 00.491-.5v-6c0-.276-.219-.5-.491-.5z" fill="#FFF"></path></g></svg></div>
    <div class="node-label">Lambda</div>
  </div>

</div>

<div class="panel">
  <div class="panel-header">
    <span class="panel-icon" id="p-icon">🖥️</span>
    <span class="panel-title" id="p-title">Client</span>
  </div>
  <div class="panel-text" id="p-body"></div>
</div>

<script>
const ICONS = {
  apigw: `<svg height="22" width="22" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient x1="0%" y1="100%" x2="100%" y2="0%" id="pi-apigw"><stop stop-color="#4D27A8" offset="0%"/><stop stop-color="#A166FF" offset="100%"/></linearGradient></defs><g fill="none" fill-rule="evenodd"><path d="M0 0h22v22H0z" fill="url(#pi-apigw)"/><path transform="scale(0.55)" d="M19 28h2v-1h-2v1zM14 7.262l-7 3.04v20.055l7 2.439V7.262zM15 13v14h2v1h-2v5.5a.5.5 0 01-.664.472l-8-2.787A.5.5 0 016 30.713V9.974c0-.199.118-.379.301-.458l8-3.474A.5.5 0 0115 6.5V12h2v1h-2zm18-2.698l-7-3.04v25.534l7-2.439V10.302zm1-.328v20.739a.5.5 0 01-.336.472l-8 2.787a.507.507 0 01-.454-.064.5.5 0 01-.21-.408V28h-2v-1h2V13h-2v-1h2V6.5a.5.5 0 01.699-.458l8 3.474a.499.499 0 01.301.458zM19 13h2v-1h-2v1zm4.975 2.658l-.95-.316-3 9 .95.316 3-9zm-4.829 7.196l-3-3a.502.502 0 010-.708l3-3 .708.708-2.647 2.646 2.647 2.646-.708.708z" fill="#FFF"/></g></svg>`,
  lambda: `<svg height="22" width="22" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient x1="0%" y1="100%" x2="100%" y2="0%" id="pi-lambda"><stop stop-color="#C8511B" offset="0%"/><stop stop-color="#F90" offset="100%"/></linearGradient></defs><g fill="none" fill-rule="evenodd"><path d="M0 0h22v22H0z" fill="url(#pi-lambda)"/><path transform="scale(0.55)" d="M14.386 33H8.27l6.763-14.426 3.064 6.44L14.387 33zm1.085-15.798a.49.49 0 00-.442-.282h-.002a.493.493 0 00-.441.285l-7.538 16.08a.507.507 0 00.028.482c.09.145.247.233.415.233h7.206c.19 0 .363-.111.445-.286l3.944-8.489a.508.508 0 00-.002-.432l-3.613-7.591zM32.018 33h-5.882l-9.47-20.711a.491.491 0 00-.444-.289H12.37l.005-5h7.549l9.424 20.71c.08.177.256.29.446.29h2.224v5zm.49-6h-2.4L20.684 6.29a.492.492 0 00-.446-.29h-8.353a.496.496 0 00-.491.5l-.006 6c0 .132.052.259.144.354a.488.488 0 00.347.146h4.032l9.468 20.711c.08.176.254.289.445.289h6.686a.495.495 0 00.491-.5v-6c0-.276-.219-.5-.491-.5z" fill="#FFF"/></g></svg>`,
};

const DATA = {
  gateway: {
    client: {
      icon: '🖥️', title: 'Client',
      body: `The client (a browser, mobile app, or upstream service) makes a standard <span class="chip blue">HTTPS</span> request to your API URL. It has <b style="color:#e2e8f0">no idea Lambda exists</b>. It just talks to an API.`
    },
    apigw: {
      icon: ICONS.apigw, title: 'API Gateway',
      body: `API Gateway is the public-facing front door. It enforces your security policy <em>before</em> Lambda ever runs:
      <br><br>
      <span class="chip green">IAM Auth</span>
      <span class="chip green">API Keys</span>
      <span class="chip green">Cognito / JWT</span>
      <span class="chip green">Rate Limiting</span>
      <span class="chip green">Request Validation</span>
      <span class="chip green">CORS</span>
      <span class="chip green">TLS Termination</span>
      <br><br>Clients get a <b style="color:#e2e8f0">stable, versioned endpoint</b>. You can swap out Lambda entirely without clients noticing.`
    },
    lambda: {
      icon: ICONS.lambda, title: 'AWS Lambda',
      body: `With this setup, Lambda executes your business logic in response to events forwarded by API Gateway. It is <b style="color:#e2e8f0">never exposed directly</b> to the public internet in this pattern. Only API Gateway can invoke it, using an IAM-scoped role.
      <br><br>
      <span class="chip amber">Event-driven</span>
      <span class="chip amber">Serverless</span>
      <span class="chip amber">IAM Role-scoped</span>
      <span class="chip amber">Reduced attack surface</span>`
    }
  },
  direct: {
    client: {
      icon: '⚠️', title: 'Direct Invocation',
      body: `Calling Lambda directly (ie via a public Function URL) makes it more difficult to add security layers.
      <br><br>
      <span class="chip red">No rate limiting</span>
      <span class="chip red">Exposed function URL</span>`
    },
    lambda: {
      icon: 'λ', title: 'AWS Lambda (Directly Exposed)',
      body: `Lambda can be invoked directly via its <span class="chip amber">Function URL</span>. Auth is possible with IAM, but you lose the rich API management features that API Gateway provides. You can still use direct invocation for debugging, internal automation, or event-driven pipelines, but not public APIs.`
    }
  }
};

let mode = 'gateway';
let selected = 'client';

function pick(node) {
  selected = node;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.getElementById('n-' + node).classList.add('active');
  renderPanel();
}

function renderPanel() {
  const modeData = DATA[mode];
  const info = modeData[selected] || modeData['client'];
  document.getElementById('p-icon').innerHTML = info.icon;
  document.getElementById('p-title').textContent = info.title;
  document.getElementById('p-body').innerHTML = info.body;
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-gw').classList.toggle('active', m === 'gateway');
  document.getElementById('btn-direct').classList.toggle('active', m === 'direct');

  const apigw  = document.getElementById('n-apigw');
  const a1     = document.getElementById('a1');
  const a1lbl  = document.getElementById('a1-lbl');
  const a1url  = document.getElementById('a1-url');
  const a1trk  = document.getElementById('a1-track');
  const a2lbl  = document.getElementById('a2-lbl');
  const a2url  = document.getElementById('a2-url');
  const a2trk  = document.getElementById('a2-track');
  const p1     = document.getElementById('p1');
  const p2     = document.getElementById('p2');
  const client = document.getElementById('n-client');

  if (m === 'direct') {
    apigw.style.display = 'none';
    a1.style.display    = 'none';
    a1url.textContent   = '';
    a2lbl.textContent = 'Direct Call';
    a2lbl.classList.remove('lit');
    a2url.textContent = 'https://abc123.lambda-url.us-east-1.on.aws/';
    a2trk.classList.remove('lit');
    p2.classList.remove('show');
    client.classList.add('direct-mode');
    if (selected === 'apigw') { pick('client'); return; }
  } else {
    apigw.style.display = '';
    a1.style.display    = '';
    a1lbl.textContent = 'HTTPS Request';
    a1lbl.classList.add('lit');
    a1url.textContent = 'https://api.example.com/prod/items';
    a1trk.classList.add('lit');
    p1.classList.add('show');
    a2lbl.textContent = 'Invoke';
    a2url.textContent = '';
    a2trk.classList.add('lit');
    p2.classList.add('show');
    client.classList.remove('direct-mode');
  }

  renderPanel();
}

renderPanel();
</script>
</body>
</html>
